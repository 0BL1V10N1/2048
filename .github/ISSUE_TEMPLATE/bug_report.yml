name: 🐛 Bug Report
description: Something is broken? Let us know!
title: "[Bug] "
labels: ["bug"]
assignees:
  - 0BL1V10N1
  - Noam790
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report! Please be as detailed as possible.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
      placeholder: Describe the bug...
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce the issue?
      placeholder: |
        1. Go to '…'
        2. Tap on '…'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
      description: What did you expect to happen?
      placeholder: It should have...
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behaviour
      description: What actually happened?
      placeholder: Instead, it...
    validations:
      required: true

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots / Recordings
      description: If applicable, add screenshots or screen recordings to help explain your problem.
      placeholder: Drag and drop images or recordings here.
    validations:
      required: false

  - type: input
    id: device
    attributes:
      label: Device
      description: What device are you using?
      placeholder: e.g. Pixel 8
    validations:
      required: true

  - type: input
    id: android-version
    attributes:
      label: Android version
      description: What Android version is running on your device?
      placeholder: e.g. Android 15
    validations:
      required: true

  - type: input
    id: app-version
    attributes:
      label: App version
      description: What version of the app are you using?
      placeholder: e.g. 1.0
    validations:
      required: true

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I have searched for existing issues before submitting this one.
          required: true
        - label: I have provided all the necessary information to reproduce the bug.
          required: true
