name: ✨ Feature Request
description: Suggest an idea or improvement for the app.
title: "[Feature] "
labels: ["enhancement"]
assignees:
  - 0BL1V10N1
  - Noam790
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a new feature! Please describe your idea as clearly as possible.

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: A clear description of the problem or limitation you're experiencing.
      placeholder: I'm frustrated when...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe the solution you'd like to see implemented.
      placeholder: I would like...
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any alternative solutions or features you've considered.
      placeholder: I also thought about...
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Add any other context, mockups, or screenshots about the feature request.
      placeholder: Drag and drop images or mockups here.
    validations:
      required: false

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I have searched for existing feature requests before submitting this one.
          required: true
